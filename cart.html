<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Infinity World</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --secondary: #0f172a;
            --accent: #f43f5e;
            --success: #22c55e;
            --bg-light: #f1f5f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background: var(--bg-light); color: var(--text-main); }

        /* --- Perfect Navbar Styling --- */
        .navbar {
            background: var(--white);
            padding: 12px 8%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: fixed; /* Top par chipka rahega */
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 13px;
            background: var(--bg-light);
            padding: 8px 16px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .back-btn:hover { background: var(--border); color: var(--primary); }

        .logo { font-weight: 800; font-size: 20px; color: var(--secondary); letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        /* --- Page Layout --- */
        .checkout-wrapper {
            max-width: 1100px; 
            margin: 100px auto 40px; /* Top margin navbar ke liye */
            display: grid; 
            grid-template-columns: 1.5fr 1fr; 
            gap: 30px;
            padding: 0 20px;
        }

        .main-content, .sidebar { 
            background: var(--white); 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); 
        }

        h2, h3 { margin-bottom: 20px; color: var(--secondary); display: flex; align-items: center; gap: 10px; }

        /* Form & Options */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--text-muted); }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 12px;
            font-size: 14px; outline: none; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary); background: #fff; }

        .options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 15px; }
        .pay-option {
            border: 2px solid var(--border); padding: 15px 10px; border-radius: 15px;
            cursor: pointer; text-align: center; transition: 0.3s;
        }
        .pay-option img { height: 22px; margin-bottom: 5px; display: block; margin-left: auto; margin-right: auto; }
        .pay-option span { font-size: 12px; font-weight: 600; }
        
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .pay-option { border-color: var(--primary); background: #f0f9ff; }

        /* Sidebar UI */
        .cart-item-mini { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .cart-item-mini img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        .summary-box { background: var(--secondary); color: white; padding: 25px; border-radius: 20px; margin-top: 20px; }
        .total-amount { font-size: 26px; font-weight: 700; color: var(--primary); }

        .checkout-btn {
            width: 100%; padding: 18px; margin-top: 20px; border: none; border-radius: 15px;
            background: var(--success); color: white; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
        }

        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 9999; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 900px) { 
            .checkout-wrapper { grid-template-columns: 1fr; margin-top: 90px; } 
            .navbar { padding: 10px 5%; }
        }

    </style>
</head>
<body>

  <nav class="navbar">
    <div style="flex: 1; display: flex; justify-content: flex-start;">
        <a href="index.html" class="back-btn" style="text-decoration:none; color:var(--text-main); font-weight:600; background:var(--bg-light); border-radius:8px; display:flex; align-items:center; gap:5px;">
            <span>←</span> Back
        </a>
    </div>

    <div class="logo" style="flex: 2; text-align: center; font-weight: 800;">
        INFINITY <span style="color: var(--primary);">WORLD</span>
    </div>

    <div style="flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 5px;">
        <div style="width: 8px; height: 8px; background: var(--success); border-radius: 50%;"></div>
        <span class="secure-text" style="font-size: 10px; font-weight: 700; color: var(--text-muted); white-space: nowrap;">SECURE</span>
    </div>
</nav>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 600;">Processing Your Order...</p>
    </div>

    <div class="checkout-wrapper">
        <div class="main-content">
            <h2>📍 Shipping Details</h2>
            <form id="shippingForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="custName" placeholder="e.g. Rahul Sharma" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="custEmail" placeholder="rahul@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="custPhone" placeholder="+91 98765 43210" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Delivery Address</label>
                    <textarea id="custAddress" rows="3" placeholder="House No, Street, City, Pincode" required></textarea>
                </div>
            </form>

            <h3 style="margin-top: 30px;">💳 Payment Method</h3>
            <div class="options">
                <label>
                    <input type="radio" name="pay" value="Paytm" onchange="showPayForm('Paytm')">
                    <div class="pay-option">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Paytm_Logo_%28standalone%29.svg/1200px-Paytm_Logo_%28standalone%29.svg.png" alt="Paytm">
                        <span>Paytm</span>
                    </div>
                </label>
                <label>
                    <input type="radio" name="pay" value="PhonePe" onchange="showPayForm('PhonePe')">
                    <div class="pay-option">
                        <img src="https://images.ctfassets.net/drk57q8lctrm/2xVzOuwCEAwvno1fx5Ywo/13fbf64e95946dc6164e626392336cfe/phonepe-logo.webp" alt="PhonePe">
                        <span>PhonePe</span>
                    </div>
                </label>
                <label>
                    <input type="radio" name="pay" value="UPI" onchange="showPayForm('UPI')">
                    <div class="pay-option">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/UPI_logo.svg/1280px-UPI_logo.svg.png" alt="UPI">
                        <span>Any UPI</span>
                    </div>
                </label>
            </div>

            <div id="payment-details-section" style="display: none; margin-top: 25px; padding: 25px; background: #f8faff; border-radius: 18px; border: 1.5px dashed #cbd5e0;">
                <h4 id="selected-pay-method" style="margin-bottom: 15px;">Enter Details</h4>
                <div class="form-group">
                    <label>UPI ID / Mobile Number</label>
                    <input type="text" id="payId" placeholder="user@upi">
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Transaction PIN (Demo)</label>
                    <input type="password" id="payPin" maxlength="6" placeholder="● ● ● ● ● ●">
                </div>
            </div>
        </div>

        <div class="sidebar">
            <h3>🛒 Order Summary</h3>
            <div id="miniCartList"></div>

            <div class="summary-box">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>Grand Total</span>
                    <span class="total-amount" id="totalPrice">₹0</span>
                </div>
            </div>

            <button class="checkout-btn" onclick="validateAndPay()">Complete Order</button>
            <center><a href="index.html" style="display:block; margin-top:15px; font-size:13px; color: var(--text-muted); text-decoration:none;">← Edit Cart</a></center>
        </div>
    </div>

    <script>
        // Load data on start
        window.onload = function() {
            const cart = JSON.parse(localStorage.getItem('cartItems')) || [];
            const list = document.getElementById('miniCartList');
            let total = 0;

            if (cart.length === 0) { window.location.href = "index.html"; return; }

            list.innerHTML = cart.map(item => {
                total += item.price;
                return `
                    <div class="cart-item-mini">
                        <img src="${item.img || 'https://via.placeholder.com/50'}" alt="product">
                        <div class="mini-info"><strong>${item.name}</strong></div>
                        <div class="mini-price">₹${item.price.toLocaleString()}</div>
                    </div>
                `;
            }).join('');
            document.getElementById('totalPrice').innerText = `₹${total.toLocaleString()}`;
        };

        function showPayForm(method) {
            document.getElementById("payment-details-section").style.display = "block";
            document.getElementById("selected-pay-method").innerText = "Enter " + method + " Details";
        }

        function validateAndPay() {
            const name = document.getElementById("custName").value;
            const method = document.querySelector('input[name="pay"]:checked');
            const payId = document.getElementById("payId").value;
            const payPin = document.getElementById("payPin").value;

            if (!name || !document.getElementById("custAddress").value) {
                alert("Please fill shipping details!"); return;
            }
            if (!method) {
                alert("Please select a payment method!"); return;
            }
            if (!payId || !payPin) {
                alert("Please enter payment credentials!"); return;
            }

            document.getElementById("loader").style.display = "flex";
            setTimeout(() => {
                document.getElementById("loader").style.display = "none";
                alert("🎉 Success! Order placed for " + name);
                localStorage.removeItem('cartItems');
                window.location.href = "index.html";
            }, 3000);
        }
    </script>
</body>
</html>
